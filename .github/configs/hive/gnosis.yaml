# Hive client configuration for Gnosis Chain
# Uses Gnosis-specific client images

# Geth (Go-Ethereum) for Gnosis
# GHCR: https://ghcr.io/gnosischain/geth
- client: go-ethereum-gnosis
  nametag: ""
  build_args:
    baseimage: ghcr.io/gnosischain/geth
    tag: latest

# Nethermind for Gnosis
# Docker Hub: https://hub.docker.com/r/nethermindeth/nethermind
- client: nethermind-gnosis
  nametag: ""
  build_args:
    baseimage: nethermindeth/nethermind
    tag: master

# Reth for Gnosis
# GHCR: https://ghcr.io/gnosischain/reth_gnosis
- client: reth-gnosis
  nametag: ""
  build_args:
    baseimage: ghcr.io/gnosischain/reth_gnosis
    tag: master

# Erigon for Gnosis
# Docker Hub: https://hub.docker.com/r/erigontech/erigon
- client: erigon-gnosis
  nametag: ""
  build_args:
    baseimage: erigontech/erigon
    tag: main-latest
