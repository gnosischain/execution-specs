  fill-params: >-
    --fork=Prague --fill-static-tests
    --ignore=tests/frontier --ignore=tests/homestead
    --ignore=tests/tangerine_whistle --ignore=tests/byzantium
    --ignore=tests/constantinople --ignore=tests/istanbul
    --ignore=tests/berlin --ignore=tests/london
  feature_only: true

osaka:
  evm-type: develop
  fill-params: >-
    --fork=Osaka --fill-static-tests
    --ignore=tests/frontier --ignore=tests/homestead
    --ignore=tests/tangerine_whistle --ignore=tests/byzantium
