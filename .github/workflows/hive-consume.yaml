name: Hive Consume

on:
  push:
    branches:
      - "forks/**"
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".gitignore"
      - ".vscode/**"
      - "whitelist.txt"
      - "docs/**"
      - "mkdocs.yml"
  pull_request:
    paths:
      - ".github/workflows/hive-consume.yaml"
      - ".github/actions/start-hive-dev/**"
      - ".github/configs/hive/**"
      - "packages/testing/src/execution_testing/cli/pytest_commands/consume.py"
      - "packages/testing/src/execution_testing/cli/pytest_commands/pytest_ini_files/pytest-consume.ini"
      - "packages/testing/src/execution_testing/cli/pytest_commands/plugins/consume/**"
      - "packages/testing/src/execution_testing/cli/pytest_commands/plugins/pytest_hive/**"
      - "packages/testing/src/execution_testing/fixtures/consume.py"
      - "packages/testing/src/execution_testing/rpc/**"
  workflow_dispatch:

concurrency:
  group: hive-consume-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  fill:
    name: Generate Fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout execution-specs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Python and install deps
        run: |
          uv python install 3.11
          uv python pin 3.11
          uv sync --all-extras
          uv pip install solc-select
          uv run solc-select use 0.8.24 --always-install

      - name: Run fill to generate fixtures
        run: |
          uv run fill tests/osaka --fork Osaka --clean -v -x

      - name: Upload generated fixtures
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-fixtures
          path: fixtures/blockchain_tests_engine/

  consume:
    name: Consume (nethermind-gnosis)
    runs-on: ubuntu-latest
    needs: fill
    steps:
      - name: Checkout execution-specs
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Download fixtures from fill job
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: test-fixtures
          path: fixtures/blockchain_tests_engine/

      - name: Setup go env and cache
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ">=1.24"

      - name: Build and install Hive
        run: |
          git clone -b master https://github.com/gnosischain/hive.git
          cd hive
          go build -o hive

      - name: Start Hive (dev mode)
        id: start-hive
        uses: ./.github/actions/start-hive-dev
        with:
          clients: nethermind-gnosis
          client-file: .github/configs/hive/gnosis.yaml
          hive-path: hive
          timeout: "300"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Python and install deps
        run: |
          uv python install 3.11
          uv python pin 3.11
          uv sync --all-extras

      - name: Run consume against nethermind-gnosis
        env:
          HIVE_SIMULATOR: ${{ steps.start-hive.outputs.hive-url }}
        run: |
          uv run consume engine -v --input fixtures/blockchain_tests_engine/

      - name: Upload Hive logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hive-log
          path: hive/hive.log
