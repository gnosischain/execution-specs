name: Hive - BAL
on:
  schedule:
    - cron: '0 0 * * *'  # Run every day at 00:00 UTC
  workflow_dispatch:
    inputs:
      client:
        type: string
        default: '"go-ethereum-gnosis","reth-gnosis","nethermind-gnosis","erigon-gnosis"'
        description: Comma-separated list of clients to test e.g. go-ethereum-gnosis, reth-gnosis, nethermind-gnosis, erigon-gnosis
      simulator:
        type: string
        default: >-
          "gnosis/eels/consume-engine",
          "gnosis/eels/consume-rlp"
        description: >-
          Comma-separated list of simulators to test
          e.g. gnosis/eels/consume-engine, gnosis/eels/consume-rlp
      hive_version:
        type: string
        default: gnosischain/hive@master
        description: GitHub repository and tag for hive (repo@tag)
      client_source:
        type: choice
        default: docker
        description: >-
          How client images should be sourced.
          'git' will use the github repo and tag (See client_repos).
          'docker' will use the docker registry and tag (See client_images).
        options:
          - docker
          - git
      common_client_tag:
        type: string
        description: >-
          If provided, this tag will be used for all clients, overriding individual tags/branches in client_repos and client_images
        default: ""
      client_repos:
        type: string
        default: |
          {
            "geth": "gnosischain/go-ethereum@release-1.17.1-gc",
            "reth": "gnosischain/reth_gnosis@master",
            "nethermind": "NethermindEth/nethermind@bal-devnet-3",
            "erigon": "erigontech/erigon@bal-devnet-3"
          }
        description: 'JSON object containing client versions in format {"client": "repo@tag", ...}'
      client_images:
        type: string
        default: |
          {
            "geth": "ghcr.io/gnosischain/geth:latest",
            "reth": "ghcr.io/gnosischain/reth_gnosis:latest",
            "nethermind": "nethermind/nethermind:bal-devnet-3",
            "erigon": "erigontech/erigon:bal-devnet-3"
          }
        description: 'JSON object containing client docker images in format {"client": "registry:tag", ...}'

env:
  # Proxy
  GOPROXY: "${{ vars.GOPROXY }}"
  # Hive action environment variables
  GCS_BUCKET: gnosis-hive-ui-staging
  GCS_PATH: bal
  GCS_PUBLIC_URL: https://storage.googleapis.com/gnosis-hive-ui-staging/bal
  INSTALL_RCLONE_VERSION: v1.68.2
  # Flags used for all simulators
  GLOBAL_EXTRA_FLAGS: >-
    --client.checktimelimit=300s
    --docker.buildoutput
  # Docker-specific flags (only used when client_source is 'docker')
  DOCKER_AUTH_FLAGS: >-
    --docker.auth
  # Flags used for the gnosis/eels/consume-engine simulator
  EELS_ENGINE_FLAGS: >-
    --sim.parallelism=6
    --sim.buildarg fixtures=${EELS_BUILD_ARG_FIXTURES}
    --sim.buildarg branch=${EELS_BUILD_ARG_BRANCH}
    --sim.limit='.*(8024|7708|7778|7843|7928|7954|8037).*'
    --sim.limit.exact=false
    --sim.loglevel=3
  # Flags used for the gnosis/eels/consume-rlp simulator
  EELS_RLP_FLAGS: >-
    --sim.parallelism=6
    --sim.buildarg fixtures=${EELS_BUILD_ARG_FIXTURES}
    --sim.buildarg branch=${EELS_BUILD_ARG_BRANCH}
    --sim.limit='.*(8024|7708|7778|7843|7928|7954|8037).*'
    --sim.limit.exact=false
    --sim.loglevel=3

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      hive_repo: ${{ steps.client_config.outputs.hive_repo }}
      hive_tag: ${{ steps.client_config.outputs.hive_tag }}
      client_config: ${{ steps.client_config.outputs.client_config }}
      client_source: ${{ inputs.client_source || 'git' }}
      fixtures_url: ${{ steps.latest.outputs.fixtures_url }}
      eels_branch: ${{ steps.latest.outputs.eels_branch }}
    steps:
      - name: Get latest bal fixtures and branch
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get latest bal fixtures release from EEST
          TAG=$(gh release list --repo gnosischain/execution-spec-tests --json tagName --limit 100 | jq -r '[.[] | select(.tagName | startswith("bal"))][0].tagName')
          FIXTURES_URL="https://github.com/gnosischain/execution-spec-tests/releases/download/${TAG}/fixtures_bal.tar.gz"
          echo "fixtures_url=$FIXTURES_URL" >> "$GITHUB_OUTPUT"
          echo "Using fixtures from: $FIXTURES_URL"

          # Get devnets/bal from EELS
          BRANCH="devnets/bal"
          echo "eels_branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Using EELS branch: $BRANCH"

      - uses: gnosischain/hive-github-action/helpers/client-config@315b005b3f9d6582796d5917ddbf0bee3dc6fbfa
        name: "Client config"
        id: client_config
        with:
          client_repos: ${{ inputs.client_repos }}
          client_images: ${{ inputs.client_images }}
          common_client_tag: ${{ inputs.common_client_tag }}
          client_source: ${{ inputs.client_source || 'git' }}
          hive_version: ${{ inputs.hive_version || 'gnosischain/hive@master' }}
          goproxy: ${{ env.GOPROXY }}

  test:
    timeout-minutes: 2160
    needs: prepare
    env:
      # BAL-specific environment variables
      HIVE_PARALLEL_TX_PROCESSING_DISABLED: "true"
      HIVE_AMSTERDAM_TIMESTAMP: "1759250952"
      # Dynamic EELS build args from prepare job
      EELS_BUILD_ARG_FIXTURES: ${{ needs.prepare.outputs.fixtures_url }}
      EELS_BUILD_ARG_BRANCH: ${{ needs.prepare.outputs.eels_branch }}
    runs-on: >-
      ${{
        matrix.simulator == 'gnosis/rpc-compat' && 'ubuntu-latest' ||
        contains(matrix.simulator, 'gnosis/eels/') && 'self-hosted-ghr-size-ccx33-x64' ||
        'ubuntu-latest'
      }}
    concurrency:
      group: >-
        ${{ github.head_ref || inputs }}-${{ matrix.client }}-${{ matrix.simulator }}-quick
    strategy:
      fail-fast: false
      matrix:
        client: >-
          ${{ fromJSON(format('[{0}]', inputs.client || '
            "go-ethereum-gnosis",
            "reth-gnosis",
            "nethermind-gnosis",
            "erigon-gnosis"
          '))}}
        simulator: >-
          ${{ fromJSON(format('[{0}]', inputs.simulator || '
            "gnosis/eels/consume-engine",
            "gnosis/eels/consume-rlp"
          '))}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: gnosischain/hive-github-action@master
        with:
          hive_repository: ${{ needs.prepare.outputs.hive_repo }}
          hive_version: ${{ needs.prepare.outputs.hive_tag }}
          client: ${{ matrix.client }}
          simulator: ${{ matrix.simulator }}
          client_config: ${{ needs.prepare.outputs.client_config }}
          extra_flags: >-
            ${{ env.GLOBAL_EXTRA_FLAGS }}
            ${{ needs.prepare.outputs.client_source == 'docker' && env.DOCKER_AUTH_FLAGS || '' }}
            ${{ matrix.simulator == 'gnosis/eels/consume-engine' && env.EELS_ENGINE_FLAGS || '' }}
            ${{ matrix.simulator == 'gnosis/eels/consume-rlp' && env.EELS_RLP_FLAGS || '' }}
          gcs_upload: true
          gcs_bucket: ${{ env.GCS_BUCKET }}
          gcs_path: ${{ env.GCS_PATH }}
          gcs_public_url: ${{ env.GCS_PUBLIC_URL }}
          rclone_config: ${{ secrets.HIVE_RCLONE_CONFIG }}
          rclone_version: ${{ env.INSTALL_RCLONE_VERSION }}
          workflow_artifact_upload: true
          website_upload: true