name: render

on:
  push:
    branches:
      - mainnet
      - 'forks/**'
    paths: &render_paths
      - 'src/ethereum/**'
      - 'static/**'
      - '.github/workflows/gh-pages.yaml'
      - 'uv.lock'
      - 'src/ethereum_spec_tools/docc.py'
      - 'src/ethereum_spec_tools/forks.py'
  workflow_dispatch:
  pull_request:
    paths: *render_paths

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  build:
    name: "Build Documentation"
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/setup-uv

      - name: Build Documentation
        run: |
          just docs-spec
          touch .just/docs-spec/.nojekyll
        env:
          DOCC_SKIP_DIFFS: ${{ case(github.event_name == 'push' && github.ref_name == github.event.repository.default_branch, '', '1') }}

      - name: Upload Pages Artifact
        id: artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: .just/docs-spec

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: "Deploy Documentation"
    if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}

    permissions:
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # TODO: Still on node20 — update when upstream releases a node22+ version
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
