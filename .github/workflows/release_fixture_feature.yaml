name: Create Fixture Feature Release

on:
  push:
    tags:
      - "tests-*@v*"
  workflow_dispatch:

jobs:
  feature-names:
    runs-on: ubuntu-latest
    outputs:
      names: ${{ steps.feature-name.outputs.names }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Get feature names
        id: feature-name
        shell: bash
        run: |
          FEATURE_PREFIX="${GITHUB_REF_NAME//@*/}"
          FEATURE_NAME="${FEATURE_PREFIX#tests-}"
          names=$(grep -Po "^${FEATURE_NAME}(?=:)" .github/configs/feature.yaml | jq  --raw-input .  | jq -c --slurp .)
          echo "names=${names}"
          echo "names=${names}" >> "$GITHUB_OUTPUT"

  build:
    needs: feature-names
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    strategy:
      matrix:
        feature: ${{ fromJSON(needs.feature-names.outputs.names) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Fetch lllc
        uses: ./.github/actions/fetch-binary
        with:
          version: v1.0.0
          repo_owner: felix314159
          repo_name: lllc-custom
          remote_name: lllc
          binary_name: lllc
          expected_sha256: 865a0d5379acb3b5471337b5dcf686a2dd71587c6b65b9da6c963de627e0b300

      - name: Fetch Solidity
        uses: ./.github/actions/fetch-binary
        with:
          version: v0.8.24
          repo_owner: gnosischain
          repo_name: solidity
          remote_name: solc-static-linux
          binary_name: solc
          expected_sha256: fb03a29a517452b9f12bcf459ef37d0a543765bb3bbc911e70a87d6a37c30d5f

      - uses: ./.github/actions/build-fixtures
        with:
          release_name: ${{ matrix.feature }}

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/tests-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
          fetch-depth: 0

      - name: Download all artifacts
        run: |
          gh run download ${{ github.run_id }} --dir ./artifacts
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Draft pre-release on EELS (canonical)
        run: |
          # Find previous tag scoped to this feature (e.g., tests-bal@v*)
          FEATURE_PREFIX="${TAG_NAME%%@*}"
          PREV_TAG=$(
            git tag --list "${FEATURE_PREFIX}@v*" --sort=-v:refname \
              | grep -v "^${TAG_NAME}$" \
              | head -n 1 \
            || true
          )
          NOTES_ARGS=()
          if [ -n "$PREV_TAG" ]; then
            NOTES_ARGS=(--notes-start-tag "$PREV_TAG")
          fi
          gh release create "$TAG_NAME" --draft --prerelease --generate-notes "${NOTES_ARGS[@]}" ./artifacts/**/*
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}

      - name: Draft pre-release on EEST (mirror)
        run: |
          EEST_TAG="${TAG_NAME#tests-}"
          gh release create "$EEST_TAG" \
            --repo gnosischain/execution-spec-tests \
            --draft \
            --prerelease \
            --notes "This release is mirrored from [gnosischain/execution-specs ${TAG_NAME}](https://github.com/gnosischain/execution-specs/releases/tag/${TAG_NAME})." \
            ./artifacts/**/*
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.EEST_RELEASE_TOKEN }}
