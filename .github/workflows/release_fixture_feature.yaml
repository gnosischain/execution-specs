name: Create Fixture Feature Release

on:
  push:
    tags:
      - "tests-*@v*"
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      combine_matrix: ${{ steps.matrix.outputs.combine_matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
      - uses: ./.github/actions/setup-uv

      - name: Generate build matrix
        id: matrix
        shell: bash
        run: |
          FEATURE_PREFIX="${GITHUB_REF_NAME//@*/}"
          FEATURE_NAME="${FEATURE_PREFIX#tests-}"
          uv run -q .github/scripts/generate_build_matrix.py "$FEATURE_NAME" >> "$GITHUB_OUTPUT"

  build:
    name: fill (${{ matrix.label || matrix.feature }})
    needs: setup
    runs-on: [self-hosted-ghr, size-gigachungus-x64]
    timeout-minutes: 1440
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Fetch lllc
        uses: ./.github/actions/fetch-binary
        with:
          version: v1.0.0
          repo_owner: felix314159
          repo_name: lllc-custom
          remote_name: lllc
          binary_name: lllc
          expected_sha256: 865a0d5379acb3b5471337b5dcf686a2dd71587c6b65b9da6c963de627e0b300

      - name: Fetch Solidity
        uses: ./.github/actions/fetch-binary
        with:
          version: v0.8.24
          repo_owner: ethereum
          repo_name: solidity
          remote_name: solc-static-linux
          binary_name: solc
          expected_sha256: fb03a29a517452b9f12bcf459ef37d0a543765bb3bbc911e70a87d6a37c30d5f

      - uses: ./.github/actions/build-fixtures
        with:
          release_name: ${{ matrix.feature }}
          from_fork: ${{ matrix.from_fork }}
          until_fork: ${{ matrix.until_fork }}
          split_label: ${{ matrix.label }}

  combine:
    name: combine (${{ matrix.feature }})
    needs: [setup, build]
    if: needs.setup.outputs.combine_matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.combine_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
      - uses: ./.github/actions/setup-uv
      - name: Install pigz
        run: sudo apt-get install -y pigz
      - name: Download and merge split artifacts
        shell: bash
        run: |
          mkdir -p combined
          for label in ${{ matrix.labels }}; do
            echo "Downloading: build__${label}"
            gh run download ${{ github.run_id }} -n "build__${label}" --dir "split_artifacts/build__${label}"
            cp -r "split_artifacts/build__${label}"/* combined/
          done
          echo "Combined directory contents:"
          find combined -maxdepth 3 -type d | head -30
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create release tarball
        shell: bash
        run: |
          uv run -q .github/scripts/create_release_tarball.py combined fixtures_${{ matrix.feature }}.tar.gz
      - name: Upload combined fixture tarball
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fixtures_${{ matrix.feature }}
          path: fixtures_${{ matrix.feature }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build, combine]
    if: always() && needs.build.result == 'success' && (needs.combine.result == 'success' || needs.combine.result == 'skipped') && startsWith(github.ref, 'refs/tags/tests-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
          fetch-depth: 0

      - name: Download release artifacts
        shell: bash
        run: |
          gh run download ${{ github.run_id }} -p "fixtures_*" --dir ./artifacts
          gh run download ${{ github.run_id }} -p "benchmark_genesis_*" --dir ./artifacts || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Draft pre-release on EELS (canonical)
        run: |
          # Find previous tag scoped to this feature (e.g., tests-bal@v*)
          FEATURE_PREFIX="${TAG_NAME%%@*}"
          PREV_TAG=$(
            git tag --list "${FEATURE_PREFIX}@v*" --sort=-v:refname \
              | grep -v "^${TAG_NAME}$" \
              | head -n 1 \
            || true
          )
          NOTES_ARGS=()
          if [ -n "$PREV_TAG" ]; then
            NOTES_ARGS=(--notes-start-tag "$PREV_TAG")
          fi
          gh release create "$TAG_NAME" --draft --prerelease --generate-notes "${NOTES_ARGS[@]}" ./artifacts/**/*
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}

      - name: Draft pre-release on EEST (mirror)
        run: |
          EEST_TAG="${TAG_NAME#tests-}"
          gh release create "$EEST_TAG" \
            --repo ethereum/execution-spec-tests \
            --draft \
            --prerelease \
            --notes "This release is mirrored from [ethereum/execution-specs ${TAG_NAME}](https://github.com/ethereum/execution-specs/releases/tag/${TAG_NAME})." \
            ./artifacts/**/*
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.EEST_RELEASE_TOKEN }}
