name: Test mkdocs documentation

on:
  push:
    branches:
      - mainnet
      - "forks/**"
    paths: &mkdocs_paths
      - uv.lock
      - CONTRIBUTING.md
      - SECURITY.md
      - "docs/**"
      - "packages/testing/**"
      - ".github/workflows/test-docs.yaml"
      # disabling on tests/** until site is deployed with the "test case reference"
      # - "tests/**"
  pull_request:
    paths: *mkdocs_paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  mkdocs:
    name: Test html documentation build with mkdocs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gnosischain/execution-specs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-uv
      - name: Build html documentation with mkdocs
        run: just docs

  changelog:
    name: Validate changelog entries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gnosischain/execution-specs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-uv
      - name: Run changelog validation
        run: just changelog

  lint-md:
    name: Lint markdown files with markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gnosischain/execution-specs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # TODO: Still on node20 — update when upstream releases a node22+ version
      - uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22.0.0
        with:
          globs: |
            docs/**/*.md
            *.md
