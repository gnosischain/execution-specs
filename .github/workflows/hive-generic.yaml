name: Hive - Generic
on:
  workflow_dispatch:
    inputs:
      client:
        type: string
        default: '["go-ethereum-gnosis","reth-gnosis","nethermind-gnosis","erigon-gnosis"]'
        description: JSON array of clients to test .e.g go-ethereum-gnosis, reth-gnosis, nethermind-gnosis, erigon-gnosis
      client_matrix:
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
        description: If "true", run each client in a separate matrix job. If "false", run all clients together in a single job.
      simulator:
        type: string
        # Disabled for now: devp2p, gnosis/consensus, gnosis/graphql, gnosis/rpc-compat
        default: >-
          [
            "gnosis/eels/consume-engine",
            "gnosis/eels/consume-rlp"
          ]
        description: JSON array of simulators to test e.g. gnosis/rpc-compat, gnosis/eels/consume-engine, gnosis/eels/consume-rlp
      hive_version:
        type: string
        default: gnosischain/hive@master
        description: GitHub repository and tag for hive (repo@tag)
      client_source:
        type: choice
        description: >-
          How client images should be sourced.
          'git' will use the github repo and tag (See client_config repos).
          'docker' will use the docker registry and tag (See client_config images).
        options:
          - docker
          - git
        default: git
      client_config:
        type: string
        default: |
          {
            "repos": {
              "geth": "gnosischain/go-ethereum@release-1.17.2-gc",
              "reth": "gnosischain/reth_gnosis@master",
              "nethermind": "NethermindEth/nethermind@master",
              "erigon": "erigontech/erigon@main"
            },
            "images": {
              "geth": "ghcr.io/gnosischain/geth:latest",
              "reth": "ghcr.io/gnosischain/reth_gnosis:latest",
              "nethermind": "nethermind/nethermind:latest",
              "erigon": "erigontech/erigon:latest"
            }
          }
        description: 'JSON object containing client configuration with "repos" and "images" objects for git and docker sources respectively'
      extra_flags:
        type: string
        default: ""
        description: Additional flags to append to the hive command
      concurrency_group:
        type: string
        default: "default"
        description: Concurrency group for the workflow
      workflow_artifact_upload:
        description: "Upload test results as an workflow artifact"
        required: false
        default: "false"
      timeout_minutes:
        type: string
        default: "2880"
        description: "Timeout in minutes for the test job (default: 2880 = 2 days)"


env:
  # Proxy
  GOPROXY: "${{ vars.GOPROXY }}"
  # Hive action environment variables
  GCS_BUCKET: gnosis-hive-ui-staging
  GCS_PATH: generic
  GCS_PUBLIC_URL: https://storage.googleapis.com/gnosis-hive-ui-staging/generic
  INSTALL_RCLONE_VERSION: v1.68.2
  EELS_BUILD_ARG_FIXTURES: https://github.com/gnosischain/execution-spec-tests/releases/download/mainnet@v0.1.0/fixtures_mainnet.tar.gz
  EELS_BUILD_ARG_BRANCH: forks/amsterdam
  # Flags used for all simulators
  GLOBAL_EXTRA_FLAGS: >-
    --client.checktimelimit=180s
    --sim.parallelism=1
    --docker.auth
    --docker.buildoutput
  # Flags used for the gnosis/eels/consume-engine simulator
  EELS_ENGINE_FLAGS: >-
    --sim.buildarg fixtures=${EELS_BUILD_ARG_FIXTURES}
    --sim.buildarg branch=${EELS_BUILD_ARG_BRANCH}
    --sim.loglevel=3
  # Flags used for the gnosis/eels/consume-rlp simulator
  EELS_RLP_FLAGS: >-
    --sim.buildarg fixtures=${EELS_BUILD_ARG_FIXTURES}
    --sim.buildarg branch=${EELS_BUILD_ARG_BRANCH}
    --sim.loglevel=3
  # # Flags used for the gnosis/rpc-compat simulator
  # RPC_COMPAT_FLAGS: >-
  #   --sim.loglevel=3
  # # Flags used for the gnosis/consensus simulator
  # CONSENSUS_FLAGS: >-
  #   --sim.loglevel=3
  # # Flags used for the gnosis/graphql simulator
  # GRAPHQL_FLAGS: >-
  #   --sim.loglevel=3

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      # Hive version
      hive_repo: ${{ steps.client_config.outputs.hive_repo }}
      hive_tag: ${{ steps.client_config.outputs.hive_tag }}
      # client_config contains the YAML client config for Hive
      client_config: ${{ steps.client_config.outputs.client_config }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v5.0.0
      - uses: gnosischain/hive-github-action/helpers/client-config@315b005b3f9d6582796d5917ddbf0bee3dc6fbfa
        name: "Client config"
        id: client_config
        with:
          client_repos: ${{ toJSON(fromJSON(inputs.client_config).repos) }}
          client_images: ${{ toJSON(fromJSON(inputs.client_config).images) }}
          client_source: ${{ inputs.client_source }}
          hive_version: ${{ inputs.hive_version }}
          goproxy: ${{ env.GOPROXY }}

  test:
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    needs: prepare
    runs-on: ubuntu-latest
    concurrency:
      group: >-
        ${{ github.head_ref || inputs.concurrency_group }}-${{ matrix.client }}-${{ matrix.simulator }}
    strategy:
      fail-fast: false
      matrix:
        client: >-
          ${{
            inputs.client_matrix == 'true' && fromJSON(inputs.client) ||
            fromJSON(format('["{0}"]', join(fromJSON(inputs.client), '-')))
          }}
        simulator: ${{ fromJSON(inputs.simulator) }}
    steps:
      - name: Relocate Docker to /mnt & free root disk
        run: |
          echo "=== Disk before ==="
          df -h

          # Free root partition
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/lib/jvm \
                      /usr/share/swift /usr/local/.ghcup
          sudo apt-get clean -y
          sudo apt-get autoremove -y

          echo "=== Disk after cleanup ==="
          df -h

          # Stop Docker, move data root to /mnt (~70GB available)
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          echo '{"data-root": "/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          sudo systemctl is-active docker

          echo "=== Docker root dir ==="
          docker info | grep "Docker Root Dir"

          echo "=== Disk after Docker relocation ==="
          df -h

      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v5.0.0
      - uses: gnosischain/hive-github-action@315b005b3f9d6582796d5917ddbf0bee3dc6fbfa
        with:
          hive_repository: ${{ needs.prepare.outputs.hive_repo }}
          hive_version: ${{ needs.prepare.outputs.hive_tag }}
          client: ${{ inputs.client_matrix == 'true' && matrix.client || join(fromJSON(inputs.client), ',') }}
          simulator: ${{ matrix.simulator }}
          client_config: ${{ needs.prepare.outputs.client_config }}
          extra_flags: >-
            ${{ env.GLOBAL_EXTRA_FLAGS }}
            ${{ matrix.simulator == 'gnosis/eels/consume-engine' && env.EELS_ENGINE_FLAGS || '' }}
            ${{ matrix.simulator == 'gnosis/eels/consume-rlp' && env.EELS_RLP_FLAGS || '' }}
            ${{ inputs.extra_flags }}
          gcs_upload: true
          gcs_bucket: ${{ env.GCS_BUCKET }}
          gcs_path: ${{ env.GCS_PATH }}
          gcs_public_url: ${{ env.GCS_PUBLIC_URL }}
          rclone_config: ${{ secrets.HIVE_RCLONE_CONFIG }}
          rclone_version: ${{ env.INSTALL_RCLONE_VERSION }}
          workflow_artifact_upload: ${{ inputs.workflow_artifact_upload }}
          website_upload: true
          website_index_generation: true
