name: EEST → Hive

on:
  workflow_dispatch:
    inputs:
      fork:
        description: "Fork passed to --fork"
        required: true
        default: "Osaka"
      client:
        description: "Client passed to --client"
        required: true
        default: "nethermind-gnosis"
      test_dir:
        description: "Test directory to execute"
        required: true
        default: "osaka"
  
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v5.0.0

      - name: Clone Hive repository
        run: |
          git clone https://github.com/gnosischain/hive.git
          cd hive
          git checkout c47a63c0a2bab94179b4202c84d830be009cfb2e

      - name: Install Go (for Hive)
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ">=1.24"
          cache-dependency-path: hive/go.sum

      - name: Build and install Hive
        run: |
          cd hive
          go install ./...
          cd ..
      
      - name: Start Hive in background
        run: |
          cd hive
          ~/go/bin/hive --dev --client "${{ github.event.inputs.client }}" \
            --dev.addr=127.0.0.1:3000 \
            --loglevel=5 \
            --sim.loglevel=5 \
            --docker.output \
            --docker.pull > hive.log 2>&1 &
      
      - name: Install wait-on utility
        run: npm install -g wait-on

      - name: Wait for Hive to listen on port 3000
        run: |
          set -xe
          npx wait-on --timeout 600000 tcp:127.0.0.1:3000

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"  # uv installs here on Ubuntu
      
      - name: Bootstrap Python and install deps
        run: |
          pip install uv
          uv python install 3.11
          uv python pin 3.11
          uv sync --all-extras
          uv pip install solc-select
          uv run solc-select use 0.8.24 --always-install
      
      - name: Run fill
        run: |
          uv run fill "tests/${{ github.event.inputs.test_dir }}" --fork "${{ github.event.inputs.fork }}" --clean -v -x

      - name: Run test against client
        env:
          HIVE_SIMULATOR: http://127.0.0.1:3000
        run: |
          FORK_LOWER=$(echo "${{ github.event.inputs.fork }}" | tr '[:upper:]' '[:lower:]')
          uv run consume engine -v --input "fixtures/blockchain_tests_engine/for_$FORK_LOWER"

      - name: Upload Hive logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hive-log
          path: hive/hive.log